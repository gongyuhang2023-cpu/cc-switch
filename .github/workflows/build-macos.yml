name: Build macOS (unsigned)

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable updater (avoid signing key requirement)
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('src-tauri/tauri.conf.json')
          c = json.loads(p.read_text())
          # 1) Tell bundler NOT to create updater artifacts
          c['bundle']['createUpdaterArtifacts'] = False
          # 2) Remove updater plugin config (contains pubkey)
          c.get('plugins', {}).pop('updater', None)
          p.write_text(json.dumps(c, indent=2))
          "
          echo "--- Patched tauri.conf.json (updater disabled) ---"
          grep -E 'createUpdater|updater' src-tauri/tauri.conf.json || echo '(no updater references remain)'

      - name: Build Tauri (universal binary)
        run: pnpm tauri build --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p release-assets
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          # DMG from Tauri bundler
          find "$BUNDLE/dmg" -name "*.dmg" -exec cp {} release-assets/ \; 2>/dev/null || true
          # Zip the .app
          APP=$(find "$BUNDLE/macos" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            (cd "$(dirname "$APP")" && zip -r "$OLDPWD/release-assets/CC-Switch-macOS-unsigned.zip" "$(basename "$APP")")
          fi
          echo "--- Release assets ---"
          ls -lh release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-macos-unsigned
          path: release-assets/*
          if-no-files-found: error
